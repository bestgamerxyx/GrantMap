<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GrantMap</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f9fc; color: #222; }
    h1 { color: #1f4fa3; margin-bottom: 6px; }
    p { margin-top: 0; color: #555; }
    table { border-collapse: collapse; width: 100%; background: white; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: top; }
    th { background: #eef3fb; }
    a { color: #1f4fa3; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>GrantMap</h1>
  <p>Prototype grant search site</p>

  <table>
    <tr>
      <th>Grant</th>
      <th>Funder</th>
      <th>Link</th>
    </tr>
    <tr>
      <td>NIH R01 Research Project Grant</td>
      <td>National Institutes of Health</td>
      <td><a href="https://grants.nih.gov/grants/funding/r01.htm" target="_blank">Open</a></td>
    </tr>
    <tr>
      <td>Wellcome Trust Discovery Awards</td>
      <td>Wellcome Trust</td>
      <td><a href="https://wellcome.org/grant-funding" target="_blank">Open</a></td>
    </tr>
    <tr>
      <td>ERC Starting Grant</td>
      <td>European Commission</td>
      <td><a href="https://erc.europa.eu/funding/starting-grants" target="_blank">Open</a></td>
    </tr>
  </table>
</body>
</html>
