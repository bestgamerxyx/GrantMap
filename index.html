<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrantMap</title>
  <style>
    :root {
      --blue: #0F67B8;
      --charcoal: #37424F;
      --bg: #F7F9FC;
      --border: #E6ECF2;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--charcoal);
    }

    .navbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav-inner img {
      height: 42px;
      width: auto;
    }

    .brand {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--charcoal);
    }

    .hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px 28px;
      text-align: center;
    }

    .hero img {
      max-width: 320px;
      width: 100%;
      height: auto;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.2rem;
      color: var(--charcoal);
    }

    .hero p {
      color: #5f6b76;
      margin: 10px 0 24px;
      font-size: 1.05rem;
    }

    .controls {
      max-width: 1000px;
      margin: 0 auto 20px;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 12px;
      padding: 0 24px;
    }

    .controls input,
    .controls select,
    .controls button {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      background: white;
    }

    .controls button {
      background: var(--blue);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .controls button:hover {
      opacity: 0.92;
    }

    .results-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 40px;
    }

    .results-count {
      margin: 12px 0 16px;
      color: #5f6b76;
      font-size: 0.95rem;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }

    .card h3 {
      margin: 0 0 8px;
      color: var(--charcoal);
      font-size: 1.15rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }

    .pill {
      background: #eef4fb;
      color: var(--blue);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      font-weight: bold;
    }

    .desc {
      margin: 10px 0 14px;
      color: #4e5a66;
      line-height: 1.45;
    }

    .card a {
      display: inline-block;
      text-decoration: none;
      color: white;
      background: var(--blue);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .card a:hover {
      opacity: 0.92;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-inner">
      <img src="logo.png" alt="GrantMap logo">
      <div class="brand">GrantMap</div>
    </div>
  </div>

  <div class="hero">
    <img src="logo.png" alt="GrantMap logo">
    <h1>Find research funding faster</h1>
    <p>Search curated grants by keyword, field, funder, or country.</p>
  </div>

  <div class="controls">
    <input id="search" type="text" placeholder="Search grants by keyword, field, funder, or country">
    <select id="countryFilter">
      <option value="">All Countries / Regions</option>
    </select>
    <select id="fieldFilter">
      <option value="">All Research Fields</option>
    </select>
    <button id="clearBtn">Clear</button>
  </div>

  <div class="results-wrap">
    <div class="results-count" id="resultsCount">Loading grants...</div>
    <div id="results"></div>
  </div>

  <script>
    let grants = [];

    async function loadCSV() {
      const response = await fetch("grants.csv");
      const text = await response.text();
      const rows = parseCSV(text);
      const headers = rows[0];
      grants = rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (row[i] || "").trim());
        return obj;
      });
      populateFilters();
      renderGrants(grants);
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(cell);
          cell = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (cell !== '' || row.length > 0) {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
          }
        } else {
          cell += char;
        }
      }

      if (cell !== '' || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    function populateFilters() {
      const countrySet = new Set();
      const fieldSet = new Set();

      grants.forEach(g => {
        if (g["Country or Region"]) countrySet.add(g["Country or Region"]);
        if (g["Research Field"]) fieldSet.add(g["Research Field"]);
      });

      const countryFilter = document.getElementById("countryFilter");
      const fieldFilter = document.getElementById("fieldFilter");

      [...countrySet].sort().forEach(country => {
        const opt = document.createElement("option");
        opt.value = country;
        opt.textContent = country;
        countryFilter.appendChild(opt);
      });

      [...fieldSet].sort().forEach(field => {
        const opt = document.createElement("option");
        opt.value = field;
        opt.textContent = field;
        fieldFilter.appendChild(opt);
      });
    }

    function renderGrants(data) {
      const results = document.getElementById("results");
      const count = document.getElementById("resultsCount");
      results.innerHTML = "";
      count.textContent = `Showing ${data.length} grants`;

      data.forEach(g => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h3>${g["Grant Title"] || "Untitled Grant"}</h3>
          <div class="meta">
            <span class="pill">${g["Funding Organization"] || "Unknown Funder"}</span>
            <span class="pill">${g["Country or Region"] || "No Region"}</span>
            <span class="pill">${g["Grant Type"] || "No Type"}</span>
            <span class="pill">${g["Research Field"] || "No Field"}</span>
            <span class="pill">${g["Application Deadline"] || "No Deadline"}</span>
          </div>
          <div class="desc">${g["Short Description"] || "No description available."}</div>
          <a href="${g["Application Link"] || "#"}" target="_blank">Open Grant</a>
        `;
        results.appendChild(card);
      });
    }

    function filterGrants() {
      const q = document.getElementById("search").value.toLowerCase();
      const country = document.getElementById("countryFilter").value;
      const field = document.getElementById("fieldFilter").value;

      const filtered = grants.filter(g => {
        const fullText = Object.values(g).join(" ").toLowerCase();
        const matchesSearch = fullText.includes(q);
        const matchesCountry = !country || g["Country or Region"] === country;
        const matchesField = !field || g["Research Field"] === field;
        return matchesSearch && matchesCountry && matchesField;
      });

      renderGrants(filtered);
    }

    document.getElementById("search").addEventListener("input", filterGrants);
    document.getElementById("countryFilter").addEventListener("change", filterGrants);
    document.getElementById("fieldFilter").addEventListener("change", filterGrants);
    document.getElementById("clearBtn").addEventListener("click", () => {
      document.getElementById("search").value = "";
      document.getElementById("countryFilter").value = "";
      document.getElementById("fieldFilter").value = "";
      renderGrants(grants);
    });

    loadCSV();
  </script>
</body>
</html>
